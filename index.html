<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عنباری</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
}

.item{
    width:100vw;
    height:100vh;
    scroll-snap-align:start;
    scroll-snap-stop:always;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

img,video{
    width:100%;
    height:100%;
    object-fit:contain;
}

.logo{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    width:40px;
    z-index:9999;
}

#splash{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
    transition:opacity .6s;
}

#popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100000;
}

#popup-box{
    border:2px solid red;
    color:white;
    padding:20px;
    border-radius:10px;
    font-size:20px;
    text-align:center;
}
</style>
</head>

<body>

<!-- splash -->
<div id="splash">
    <img src="logo.png">
</div>

<!-- logo -->
<div class="logo">
    <img src="logo.png">
</div>

<!-- popup -->
<div id="popup">
    <div id="popup-box">
        آیدی تلگرام:<br>
        @aghey
    </div>
</div>

<script>
// splash
window.addEventListener("load", () => {
    setTimeout(() => {
        const s = document.getElementById("splash");
        s.style.opacity = "0";
        setTimeout(()=>s.remove(),600);
    }, 1500);
});

// ===== FEED SYSTEM =====

let page = 0;
const PER_PAGE = 5;
const MAX = 2000;

// رندوم لیست شماره‌ها
let nums = Array.from({length: MAX}, (_, i) => i + 1);

function shuffle(a){
    for(let i=a.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
}

shuffle(nums);

function loadMore(){

    const start = page * PER_PAGE;
    const batch = nums.slice(start, start + PER_PAGE);

    batch.forEach(i => {

        document.body.insertAdjacentHTML("beforeend",
        `<div class="item">
            <img loading="lazy"
                 src="media/${i}.png"
                 onerror="this.closest('.item').remove()">
        </div>`);

        document.body.insertAdjacentHTML("beforeend",
        `<div class="item">
            <video src="media/${i}.mp4"
                   controls
                   preload="none"
                   onerror="this.closest('.item').remove()">
            </video>
        </div>`);
    });

    page++;
}

// اولین لود
loadMore();

// infinite scroll
window.addEventListener("scroll", () => {
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 800){
        loadMore();
    }
});

// video play control (FIXED)
const observer = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
        const v = e.target.querySelector("video");
        if(!v) return;

        if(e.isIntersecting) v.play().catch(()=>{});
        else v.pause();
    });
},{threshold:0.7});

// فقط یک بار observe کن (نه هر ثانیه!)
const obs = new MutationObserver(()=>{
    document.querySelectorAll(".item").forEach(el=>{
        if(!el.dataset.obs){
            observer.observe(el);
            el.dataset.obs = "1";
        }
    });
});

obs.observe(document.body,{childList:true,subtree:true});

// popup
document.querySelector(".logo").onclick=()=>{
    document.getElementById("popup").style.display="flex";
};

document.getElementById("popup").onclick=()=>{
    document.getElementById("popup").style.display="none";
};

</script>

</body>
</html>
