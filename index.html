<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عنباری</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
    scroll-behavior:smooth;
}

.item{
    width:100vw;
    height:100vh;
    scroll-snap-align:start;
    scroll-snap-stop:always;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

img,video{
    width:100%;
    height:100%;
    object-fit:contain;
}

.logo{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    width:40px;
    z-index:9999;
}

#splash{
    position:fixed;
    inset:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
    transition:opacity 0.8s ease;
}

#splash.hide{
    opacity:0;
    pointer-events:none;
}
</style>
</head>

<body>

<div id="splash">Loading...</div>

<div class="logo">
    <img src="ulogo.png">
</div>

<script>
/* ====== AUTO FEED (FIXED) ====== */
const container = document.body;

let page = 1;
const PER_PAGE = 5;
const MAX = 200;

function loadPage(p){

    const start = (p - 1) * PER_PAGE + 1;
    const end = start + PER_PAGE - 1;

    for(let i = start; i <= end && i <= MAX; i++){

        container.insertAdjacentHTML("beforeend",
        `<div class="item">
            <img loading="lazy"
                 src="media/${i}.png"
                 onerror="this.closest('.item').remove()">
        </div>`);

        container.insertAdjacentHTML("beforeend",
        `<div class="item">
            <video preload="none"
                   controls
                   src="media/${i}.mp4"
                   onerror="this.closest('.item').remove()">
            </video>
        </div>`);
    }
}

loadPage(page);

/* ====== INFINITE SCROLL ====== */
window.addEventListener("scroll", () => {
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 800){
        page++;
        loadPage(page);
    }
});

/* ====== SPLASH FIX ====== */
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("splash").classList.add("hide");
    }, 800);
});
</script>

</body>
</html>
